<!DOCTYPE html>
<html>
<head>
    <title>Message</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        .box {
            border: 1px solid #ddd;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>{{ message }}</h2>

    <button class="btn" onclick="goBack()">⬅ Back</button>
</div>

<script>
function goBack() {
    window.location.href = "{{ back_url }}";
}
</script>

</body>
</html>
